name: nexus_flutter
description: Nexus - 모바일 전용 지갑 자동화
publish_to: 'none'
version: 1.0.2+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  path_provider: ^2.1.1
  provider: ^6.1.1
  path: ^1.9.0
  image: ^4.1.3
  media_projection_screenshot: ^0.0.6
  bip39_plus: ^1.1.1
  # release APK 빌드 시 플러그인 클래스가 포함되도록 dependencies에 둠
  flutter_native_splash: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/data/app/
    - assets/data/trustwallet/

# logo.png: assets/data/app/logo.png 에 두고 dart run flutter_native_splash:create && dart run flutter_launcher_icons
flutter_native_splash:
  color: "#1E1E1E"
  image: assets/data/app/logo.png
  android_12:
    color: "#1E1E1E"
    image: assets/data/app/logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/data/app/logo.png
  adaptive_icon_background: "#1E1E1E"
  adaptive_icon_foreground: assets/data/logo.png
