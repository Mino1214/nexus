server {
    listen 80;
    server_name mynolab.kr www.mynolab.kr;

    # 정적 파일 루트 디렉토리
    root /home/myno/바탕화면/myno/macroServer/public;
    
    # 기본 index 파일 설정
    index index.html;

    # 로그 설정
    access_log /var/log/nginx/mynolab_access.log;
    error_log /var/log/nginx/mynolab_error.log;

    # Gzip 압축
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # API 요청은 Express 서버로 프록시
    location /api/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 메인 페이지(/)를 관리자 페이지로 리다이렉트
    location = / {
        return 301 /admin.html;
    }

    # 정적 파일 서빙
    location / {
        try_files $uri $uri/ =404;
        
        # 캐시 설정
        location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # 보안 헤더
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}

