server {
    listen 80;
    listen [::]:80;
    server_name mynolab.kr www.mynolab.kr;
    
    # HTTP to HTTPS redirect
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mynolab.kr www.mynolab.kr;

    # SSL 인증서
    ssl_certificate /etc/letsencrypt/live/mynolab.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mynolab.kr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 보안 헤더
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 로그
    access_log /var/log/nginx/mynolab.kr.access.log;
    error_log /var/log/nginx/mynolab.kr.error.log;

    # MacroServer public 폴더로 변경
    root /home/myno/바탕화면/myno/macroServer/public;
    index index.html;

    # MIME 타입 설정
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Gzip 압축
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/javascript application/xml+rss;

    # API 프록시 (포트 3000으로 변경)
    location /api/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # APK 다운로드 경로를 Express 서버로 프록시
    location /download/apk {
        proxy_pass http://localhost:3000/download/apk;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 메인 페이지(/)를 관리자 페이지로 리다이렉트
    location = / {
        return 301 /admin.html;
    }

    # 정적 파일 서빙
    location / {
        try_files $uri $uri/ =404;
        
        # HTML 파일은 캐싱 안함
        location ~ \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
    }

    # 정적 파일 캐싱 (JS, CSS, 이미지 등)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

