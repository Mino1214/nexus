# HTTP 설정 (기본)
server {
    listen 80;
    listen [::]:80;
    server_name nexus001.vip www.nexus001.vip;

    # 업로드(영상 등) 크기 제한 완화 (기본 1MB로 413/502 발생 가능)
    client_max_body_size 600m;

    # 보안 헤더
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 로그
    access_log /var/log/nginx/nexus001.vip.access.log;
    error_log /var/log/nginx/nexus001.vip.error.log;

    # MacroServer public 폴더
    root /home/myno/바탕화면/myno/macroServer/public;
    index admin.html index.html;

    # MIME 타입 설정
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Gzip 압축
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/javascript application/xml+rss;

    # Nexus Market API (PM2: nexus-market-api → 3000)
    location ^~ /api/market {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # FutureChart (PM2: future-chart, Vite 5180) — 외부 테스트용
    location ^~ /future-chart/ {
        proxy_pass http://127.0.0.1:5180;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
    }

    # 총마켓 포털 (totalMarket) — Vite 빌드 정적 서빙 (/api/market 는 위 블록이 우선)
    location ^~ /market/ {
        alias /home/myno/바탕화면/folder/nexus/totalMarket/dist/;
        try_files $uri $uri/ /market/index.html;
    }

    # Master Admin (masterAdmin) — Vite 빌드 정적 서빙
    location ^~ /master/ {
        alias /home/myno/바탕화면/folder/nexus/masterAdmin/dist/;
        try_files $uri $uri/ /master/index.html;
    }

    location ^~ /market-static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Pandora 코어 API (PM2: macro-server → 3001)
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # APK 다운로드는 macroServer(3001)
    location /download/apk {
        proxy_pass http://127.0.0.1:3001/download/apk;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 메인 페이지(/)를 관리자 페이지로 리다이렉트
    location = / {
        return 301 /admin.html;
    }

    # 정적 파일 서빙
    location / {
        try_files $uri $uri/ =404;
        
        # HTML 파일은 캐싱 안함
        location ~ \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
    }

    # 정적 파일 캐싱 (JS, CSS, 이미지 등)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

