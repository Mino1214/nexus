services:
  postgres:
    image: postgres:16-alpine
    container_name: polywatch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: polywatch
      POSTGRES_PASSWORD: polywatch
      POSTGRES_DB: polywatch
    ports:
      - "5432:5432"
    volumes:
      - polywatch-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polywatch -d polywatch"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: polywatch-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - polywatch-redis-data:/data

volumes:
  polywatch-postgres-data:
  polywatch-redis-data:
