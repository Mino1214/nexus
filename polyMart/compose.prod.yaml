name: polyprod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: polywatch
      POSTGRES_PASSWORD: polywatch
      POSTGRES_DB: polywatch
    volumes:
      - polywatch-postgres-prod-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polywatch -d polywatch"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - polywatch-redis-prod-data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 43121
      WEB_ORIGIN: ${WEB_ORIGIN:-http://127.0.0.1:43220}
      DATABASE_URL: ${DATABASE_URL:-postgresql://polywatch:polywatch@postgres:5432/polywatch}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:-polywatch-local-compose-secret-please-change}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-myno_demo@example.com}
      ADMIN_USERNAMES: ${ADMIN_USERNAMES:-myno_demo}
      GAMMA_API_URL: ${GAMMA_API_URL:-https://gamma-api.polymarket.com}
      CLOB_API_URL: ${CLOB_API_URL:-https://clob.polymarket.com}
      DATA_API_URL: ${DATA_API_URL:-https://data-api.polymarket.com}
      DEEPL_API_KEY: ${DEEPL_API_KEY:-}
    ports:
      - "43221:43121"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:43121/ready').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      POLYWATCH_API_UPSTREAM: http://api:43121
    ports:
      - "43220:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  polywatch-postgres-prod-data:
  polywatch-redis-prod-data:
