name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: npm

      - name: Prepare env files
        run: |
          cp apps/api/.env.example apps/api/.env
          cp apps/web/.env.example apps/web/.env

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Start local infra
        run: npm run infra:up

      - name: Run migrations
        run: npm run db:migrate

      - name: Seed demo data
        run: npm run seed:demo

      - name: Verify runtime
        run: npm run verify:runtime

      - name: Validate production compose
        run: npm run deploy:config

      - name: Build production images
        run: npm run deploy:build

      - name: Stop local infra
        if: always()
        run: |
          npm run infra:down || true
          docker compose -f compose.prod.yaml down -v || true
