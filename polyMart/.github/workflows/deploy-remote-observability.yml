name: deploy-remote-observability

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' '${{ secrets.DEPLOY_SSH_KEY }}' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H '${{ secrets.DEPLOY_HOST }}' >> ~/.ssh/known_hosts

      - name: Upload observability bundle
        run: |
          ssh '${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}' "mkdir -p '${{ secrets.DEPLOY_PATH }}/deploy/grafana/datasources' '${{ secrets.DEPLOY_PATH }}/deploy/grafana/dashboards' '${{ secrets.DEPLOY_PATH }}/deploy/grafana/dashboards-json'"
          scp compose.observability.yaml '${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/'
          scp deploy/prometheus.yml '${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/deploy/'
          scp deploy/grafana/datasources/prometheus.yml '${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/deploy/grafana/datasources/'
          scp deploy/grafana/dashboards/dashboard.yml '${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/deploy/grafana/dashboards/'
          scp deploy/grafana/dashboards-json/polywatch-overview.json '${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/deploy/grafana/dashboards-json/'

      - name: Run remote observability deploy
        run: |
          ssh '${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}' '
            set -eu
            cd "${{ secrets.DEPLOY_PATH }}"
            export PROMETHEUS_PORT="${PROMETHEUS_PORT:-43300}"
            export GRAFANA_PORT="${GRAFANA_PORT:-43301}"
            export GRAFANA_ADMIN_USER="${GRAFANA_ADMIN_USER:-admin}"
            export GRAFANA_ADMIN_PASSWORD="${GRAFANA_ADMIN_PASSWORD:-polywatch-admin}"
            docker compose --env-file deploy.edge.env -f compose.edge.ghcr.yaml -f compose.observability.yaml --profile observability up -d prometheus grafana
            curl -fsS "http://127.0.0.1:${PROMETHEUS_PORT}/-/healthy"
            curl -fsS "http://127.0.0.1:${GRAFANA_PORT}/api/health"
          '

      - name: Notify observability deployment status
        if: ${{ always() && secrets.ALERT_WEBHOOK_URL != '' }}
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
          ALERT_FORMAT: ${{ vars.ALERT_FORMAT || 'generic' }}
          ALERT_STATUS: ${{ job.status }}
          ALERT_TITLE: Polywatch deploy-remote-observability
          ALERT_TEXT: repository=${{ github.repository }} actor=${{ github.actor }}
          ALERT_SOURCE: deploy-remote-observability
          ALERT_LINK: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash scripts/ops-notify.sh
